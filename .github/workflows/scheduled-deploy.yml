name: Scheduled deploy

on:
  schedule:
    - cron: '45 14 12 3 *'  # TEST 2026-03-12: 11:45 BRT — restaurar para '0 11 * * *' após o teste
  workflow_dispatch:       # permite trigger manual

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy
        run: |
          curl -s -X POST \
            "https://api.vercel.com/v1/integrations/deploy/prj_AH5xZgvkO7TOAm2Z3CbaxlOKamcF/kI2liMLLYY" \
            --fail
